<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
/* 결과창과 똑같이 귀여운 Jua 폰트 적용 */
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        /* 딸기 우유 배경 통일! */
        background: linear-gradient(135deg, #ffe6fa 0%, #ffd3e0 100%); 
        font-family: 'Jua', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #555;
    }

    /* 하얀색 둥근 폼 상자 */
    .cute-form {
        background: white;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
        width: 100%;
        max-width: 400px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 15px; /* 입력칸 사이의 간격을 띄워줍니다 */
    }

    .title {
        color: #ff7fac;
        font-size: 32px;
        margin-bottom: 10px;
    }

    /* 🌟 글자와 입력칸을 표처럼 깔끔하게 한 줄로 묶어주는 마법의 상자 */
    .input-group {
        display: flex;
        align-items: center;
        background: #fff0f5; /* 연한 핑크 바탕 */
        padding: 10px 20px;
        border-radius: 20px;
    }

    /* 항목 이름(이름, 키, 체중, 사진) 디자인 */
    .input-group label {
        width: 60px; /* 라벨 너비를 똑같이 맞춰서 표처럼 보이게 합니다 */
        text-align: left;
        font-size: 18px;
        color: #ff6b9d;
    }

    /* 입력칸(input) 디자인 */
    .input-group input {
        flex: 1; /* 남은 공간을 꽉 채우도록 설정 */
        border: 2px solid transparent;
        border-radius: 15px;
        padding: 10px;
        font-size: 16px;
        font-family: 'Jua', sans-serif; /* 입력칸 안에도 귀여운 폰트 적용 */
        outline: none;
        transition: 0.3s;
    }

    /* 입력칸을 클릭했을 때(focus) 테두리 색상 변경 */
    .input-group input:focus {
        border-color: #ff7fac;
        background: white;
    }

    /* 파일 선택 버튼(사진) 디자인 살짝 다듬기 */
    .input-group input[type="file"] {
        font-size: 14px;
        color: #ff7fac;
        background: transparent;
        padding: 5px;
    }

    /* 젤리 버튼 디자인 (결과창과 동일) */
    button {
        width: 100%;
        padding: 15px;
        background: #ff7fac;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 22px;
        font-family: 'Jua', sans-serif;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 15px;
        box-shadow: 0 5px 15px rgba(255, 127, 172, 0.3); /* 버튼 아래 작은 그림자 */
    }
    
    button:hover { 
        background: #ff5c93; 
        transform: scale(1.05); /* 마우스 올리면 뿅! 커지는 효과 */
    }
</style>
</head>
<body>
<!-- 1.post		2. encType = muiltipart ... -->

<form id="myForm" class="cute-form" action="bmi.jsp" method="post" enctype="multipart/form-data">

<div class="title">BMI 검사</div>

<div class="input-group">이름<input name = "name" type="text" placeholder="필수, 2글자 이상"></div>
<div class="input-group">키<input name = "height" type="number" placeholder="3자리 이상, 숫자만"></div>
<div class="input-group">체중<input name = "weight" type="number" placeholder="숫자만, 공백불가"></div>
<div class="items">
사진
<div> <input type="file" name="imgFile"> </div>
</div>
<div> <button type="submit">계산</button> </div>



</form>
</body>
</html>
